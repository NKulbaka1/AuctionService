spring:
  application:
    name: auctionservice

  datasource:
    url: jdbc:postgresql://localhost:5432/auctiondb
    username: auction_user
    password: auction_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
