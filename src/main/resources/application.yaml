spring:
  application:
    name: auctionservice

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auctiondb}
    username: ${DB_USER:auction_user}
    password: ${DB_PASSWORD:auction_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

grpc:
  server:
    port: 9090
