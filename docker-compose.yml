services:
  postgres:
    image: postgres:17.2-alpine
    container_name: auction_postgres
    environment:
      POSTGRES_DB: auctiondb
      POSTGRES_USER: auction_user
      POSTGRES_PASSWORD: auction_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
